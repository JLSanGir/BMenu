</div>

</div>
</div>
<div class="flex items-center justify-between py-2">

<span class="text-on-surface-variant text-sm">2 paquetes</span>

</div>
</div>

</button>
</div>
</div>
<div class="flex items-center justify-between py-2">

</button>
</div>
</div>
</div>
</section>

</div>
