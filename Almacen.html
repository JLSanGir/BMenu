<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
          min-height: 100dvh;
        }

</head>
<body class="bg-surface font-body-md text-on-surface">
<!-- TopAppBar -->
<header class="bg-white/90 dark:bg-zinc-950/90 backdrop-blur-md docked full-width top-0 sticky border-b border-zinc-100 dark:border-zinc-800 flex items-center justify-center px-4 h-16 w-full z-50">
<h1 class="text-xl font-black tracking-widest text-orange-600 uppercase">DESPENSA</h1>
</header>
<main class="max-w-2xl mx-auto px-margin-mobile pt-md pb-32">
<!-- Section: CONGELADOR -->
<section class="bg-blue-100/80 dark:bg-blue-900/30 -mx-margin-mobile px-margin-mobile py-lg mb-lg">
<div class="flex items-center justify-between mb-sm border-b border-blue-200 dark:border-blue-800 pb-xs">
<h3 class="text-label-md font-bold text-blue-800 dark:text-blue-300 uppercase tracking-wider">CONGELADOR</h3>
<button onclick="openAddModal('congelador')" class="text-blue-600 dark:text-blue-400 font-label-md text-sm hover:underline">Añadir</button>
</div>
<div id="congeladorContainer" class="divide-y divide-blue-100 dark:divide-blue-800/50">
</div>
</section>
<!-- Section: Materias Primas -->
<section class="mb-lg">
<div class="flex items-center justify-between mb-sm border-b border-surface-variant pb-xs">
<h3 class="text-label-md font-bold text-on-surface-variant uppercase tracking-wider">Materias Primas</h3>
<button onclick="openAddModal('materias')" class="text-primary font-label-md text-sm hover:underline">Añadir</button>
</div>
<div id="materiasContainer" class="divide-y divide-surface-variant/50">
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="bg-white/95 dark:bg-slate-900/95 backdrop-blur-lg fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-2 pb-safe-offset-2 h-20 border-t border-orange-50 dark:border-orange-900/20 shadow-[0_-4px_20px_rgba(242,107,29,0.05)] rounded-t-[16px]">
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1.5 hover:text-[#F26B1D] active:scale-90 transition-transform duration-200 ease-out" href="index.html">
<span class="material-symbols-outlined">menu_book</span>
<span class="font-plus-jakarta-sans font-medium text-[11px]">Menú</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1.5 hover:text-[#F26B1D] active:scale-90 transition-transform duration-200 ease-out" href="platos.html">
<span class="material-symbols-outlined">restaurant</span>
<span class="font-plus-jakarta-sans font-medium text-[11px]">Platos</span>
</a>
<a class="flex flex-col items-center justify-center text-[#F26B1D] bg-orange-50 dark:bg-orange-900/20 rounded-xl px-4 py-1.5 transition-all duration-300 active:scale-90" href="Almacen.html">
<span class="material-symbols-outlined">inventory_2</span>
<span class="font-plus-jakarta-sans font-medium text-[11px]">Almacén</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1.5 hover:text-[#F26B1D] active:scale-90 transition-transform duration-200 ease-out" href="compra.html">
<span class="material-symbols-outlined">shopping_cart</span>
<span class="font-plus-jakarta-sans font-medium text-[11px]">Compra</span>
</a>
</nav>
<!-- FAB -->
<button onclick="openAddModal()" class="fixed bottom-24 right-6 w-14 h-14 bg-primary-container text-on-primary-container rounded-full shadow-lg flex items-center justify-center active:scale-95 transition-transform z-40">
<span class="material-symbols-outlined" data-icon="add" style="font-variation-settings: 'FILL' 1;">add</span>
</button>
<!-- Modal Añadir Almacén -->
<div id="addAlmacenModal" class="hidden fixed inset-0 z-[100] bg-black/50 backdrop-blur-sm flex items-center justify-center px-4 transition-opacity">
    <div class="bg-surface rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col">
        <div class="px-6 py-4 border-b border-outline-variant/30 flex justify-between items-center">
            <h3 class="font-headline-md text-primary text-lg">Añadir al Almacén</h3>
            <button onclick="closeAddModal()" class="text-on-surface-variant hover:text-error transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="p-6 flex flex-col gap-4">
            <label class="flex flex-col gap-1">
                <span class="font-label-md text-sm text-on-surface-variant">Ubicación</span>
                <select id="itemUbicacion" onchange="toggleFecha()" class="rounded-lg border-outline-variant border bg-surface-container-lowest p-2 focus:ring-primary focus:border-primary transition-all text-on-surface">
                    <option value="materias">Materias primas</option>
                    <option value="congelador">Congelador</option>
                </select>
            </label>
            <label class="flex flex-col gap-1">
                <span class="font-label-md text-sm text-on-surface-variant">Tipo (Producto)</span>
                <input type="text" id="itemTipo" class="rounded-lg border-outline-variant border bg-surface-container-lowest p-2 focus:ring-primary focus:border-primary transition-all text-on-surface" placeholder="Ej: Lentejas">
            </label>
            <label class="flex flex-col gap-1">
                <span class="font-label-md text-sm text-on-surface-variant">Cantidad</span>
                <input type="text" id="itemCantidad" class="rounded-lg border-outline-variant border bg-surface-container-lowest p-2 focus:ring-primary focus:border-primary transition-all text-on-surface" placeholder="Ej: 2 rac. / 1 kg">
            </label>
            <label id="containerFecha" class="hidden flex flex-col gap-1">
                <span class="font-label-md text-sm text-on-surface-variant">Fecha de congelado</span>
                <input type="date" id="itemFecha" class="rounded-lg border-outline-variant border bg-surface-container-lowest p-2 focus:ring-primary focus:border-primary transition-all text-on-surface">
            </label>
        </div>
        <div class="px-6 py-4 bg-surface-container-low flex justify-end gap-3">
            <button onclick="closeAddModal()" class="px-4 py-2 text-on-surface-variant font-label-md hover:bg-surface-variant rounded-lg transition-colors">Cancelar</button>
            <button onclick="saveNewItem()" class="px-4 py-2 bg-primary text-on-primary font-label-md rounded-lg shadow hover:bg-primary-container transition-colors active:scale-95">Guardar</button>
        </div>
    </div>
</div>

<script>
    function openAddModal(defaultUbicacion = 'materias') {
        document.getElementById('itemUbicacion').value = defaultUbicacion;
        toggleFecha();
        document.getElementById('addAlmacenModal').classList.remove('hidden');
    }

    function closeAddModal() {
        document.getElementById('addAlmacenModal').classList.add('hidden');
        document.getElementById('itemTipo').value = '';
        document.getElementById('itemCantidad').value = '';
        document.getElementById('itemFecha').value = '';
    }

    function toggleFecha() {
        const ubicacion = document.getElementById('itemUbicacion').value;
        const containerFecha = document.getElementById('containerFecha');
        if (ubicacion === 'congelador') {
            containerFecha.classList.remove('hidden');
        } else {
            containerFecha.classList.add('hidden');
        }
    }

    async function fetchAlmacen() {
        let { data, error } = await supabaseClient.from('almacen').select('*');
        
        if (data && data.length === 0 && !error) {
            const today = new Date().toISOString().split('T')[0];
            const inserts = [
                { id: 'alm_' + Date.now() + 1, ubicacion: 'materias', tipo: 'Arroz', cantidad: '1 kg', fecha: null },
                { id: 'alm_' + Date.now() + 2, ubicacion: 'materias', tipo: 'Pasta', cantidad: '2 paquetes', fecha: null },
                { id: 'alm_' + Date.now() + 3, ubicacion: 'materias', tipo: 'Huevos', cantidad: '1 docena', fecha: null },
                { id: 'alm_' + Date.now() + 4, ubicacion: 'congelador', tipo: 'Legumbres', cantidad: '2 rac.', fecha: today }
            ];
            await supabaseClient.from('almacen').insert(inserts);
            const result = await supabaseClient.from('almacen').select('*');
            data = result.data || [];
        }
        
        return data || [];
    }

    async function renderAlmacen() {
        const materiasContainer = document.getElementById('materiasContainer');
        const congeladorContainer = document.getElementById('congeladorContainer');
        
        materiasContainer.innerHTML = '<div class="text-center text-primary py-4"><span class="material-symbols-outlined animate-spin" style="font-variation-settings: \'FILL\' 0, \'wght\' 400, \'GRAD\' 0, \'opsz\' 24;">refresh</span></div>';
        congeladorContainer.innerHTML = '';
        
        const data = await fetchAlmacen();
        materiasContainer.innerHTML = '';
        
        let materiasHtml = '';
        let congeladorHtml = '';
        
        data.forEach(item => {
            if (item.ubicacion === 'materias') {
                materiasHtml += `
                    <div class="flex items-center justify-between py-2">
                        <span class="font-body-md text-on-surface">${item.tipo}</span>
                        <div class="flex items-center gap-4">
                            <span class="text-on-surface-variant text-sm">${item.cantidad}</span>
                            <button onclick="deleteItem('${item.id}')" class="text-outline hover:text-error active:scale-90 transition-transform p-1">
                                <span class="material-symbols-outlined text-sm" data-icon="delete">delete</span>
                            </button>
                        </div>
                    </div>
                `;
            } else {
                let fechaStr = '';
                if (item.fecha) {
                    const dateObj = new Date(item.fecha);
                    fechaStr = dateObj.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
                }
                congeladorHtml += `
                    <div class="flex items-center justify-between py-2">
                        <span class="font-body-md text-on-surface flex-1">${item.tipo}</span>
                        <div class="flex items-center gap-6">
                            <span class="text-on-surface-variant text-sm">${item.cantidad}</span>
                            <span class="text-on-surface-variant text-[11px] font-medium uppercase text-blue-600">${fechaStr}</span>
                            <button onclick="deleteItem('${item.id}')" class="text-outline hover:text-error active:scale-90 transition-transform p-1">
                                <span class="material-symbols-outlined text-sm" data-icon="delete">delete</span>
                            </button>
                        </div>
                    </div>
                `;
            }
        });
        
        materiasContainer.innerHTML = materiasHtml;
        congeladorContainer.innerHTML = congeladorHtml;
    }

    async function deleteItem(id) {
        if(confirm('¿Seguro que deseas eliminar este elemento?')) {
            await supabaseClient.from('almacen').delete().eq('id', id);
            renderAlmacen();
        }
    }

    async function saveNewItem() {
        const ubicacion = document.getElementById('itemUbicacion').value;
        const tipo = document.getElementById('itemTipo').value.trim();
        const cantidad = document.getElementById('itemCantidad').value.trim();
        const fecha = document.getElementById('itemFecha').value;

        if (!tipo || !cantidad) {
            alert('Por favor, introduce el tipo y la cantidad.');
            return;
        }
        if (ubicacion === 'congelador' && !fecha) {
            alert('Por favor, introduce la fecha de congelado.');
            return;
        }

        const newId = 'alm_' + Date.now();
        await supabaseClient.from('almacen').insert({
            id: newId,
            ubicacion: ubicacion,
            tipo: tipo,
            cantidad: cantidad,
            fecha: ubicacion === 'congelador' ? fecha : null
        });

        closeAddModal();
        renderAlmacen();
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderAlmacen();
        
        // Realtime Sync
        if (typeof supabaseClient !== 'undefined') {
            supabaseClient
                .channel('public:almacen')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'almacen' }, payload => {
                    renderAlmacen();
                })
                .subscribe();
        }
    });
</script>
</body></html>
