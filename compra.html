                      "secondary": "#785900",

                      "on-tertiary-fixed-variant": "#274e3d",
                      "inverse-surface": "#2f312f",
                      "tertiary": "#3f6653",
                      "outline-variant": "#e0c0b2",

                      "surface-container-lowest": "#ffffff",

                      "inverse-on-surface": "#f2f1ee",
                      "inverse-primary": "#ffb694",

<body class="bg-surface text-on-surface antialiased min-h-screen pb-32">
    <!-- TopAppBar -->
    <header class="bg-white/90 dark:bg-gray-950/90 backdrop-blur-md docked full-width top-0 z-50 border-b border-orange-100/50 dark:border-gray-800 shadow-[0_4px_20px_-4px_rgba(242,107,29,0.05)] flex items-center justify-between px-6 py-4 w-full sticky">
        <div class="flex items-center gap-4">
            <h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-orange-600 dark:text-orange-400">Lista de la Compra</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-full overflow-hidden border-2 border-primary-container active:scale-95 transition-transform duration-200 ease-out">
                <img alt="Usuario" src="MiFoto.jpg" class="w-full h-full object-cover"/>
            </div>
        </div>
    </header>

    <main class="px-margin-mobile pt-lg max-w-md mx-auto">
        
        <!-- Add Item -->
        <div class="flex items-center gap-1 mb-4 bg-surface-container-lowest rounded-xl p-1.5 shadow-sm border border-outline-variant/30">
            <input type="text" id="nuevoArticulo" class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface text-[14px] placeholder-on-surface-variant/60 py-1 px-2" placeholder="Añadir a la lista...">
            <button onclick="window.location.href='compra-basica.html'" class="h-8 px-2 flex items-center justify-center bg-surface-variant text-on-surface-variant rounded-lg active:scale-90 transition-transform gap-1 font-label-md shrink-0">
                <span class="material-symbols-outlined text-[18px]">list_alt</span>
                <span class="text-[12px]">Básico</span>
            </button>
            <button onclick="addArticulo()" class="w-8 h-8 flex items-center justify-center bg-primary text-on-primary rounded-lg active:scale-90 transition-transform shrink-0">
                <span class="material-symbols-outlined text-[20px]">add</span>
            </button>
        </div>

        <!-- List -->
        <div id="compraContainer" class="flex flex-col gap-2">
            <!-- Renderizado dinámicamente -->
        </div>

    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-white/95 dark:bg-gray-950/95 backdrop-blur-lg rounded-t-[32px] border-t border-orange-50 dark:border-gray-800 shadow-[0_-10px_40px_-15px_rgba(242,107,29,0.08)]">
        <a href="index.html" class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-orange-300 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Menú</span>
        </a>
        <a href="platos.html" class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-orange-300 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="restaurant">restaurant</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Platos</span>
        </a>
        <a href="Almacen.html" class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-orange-300 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Almacén</span>
        </a>
        <a href="compra.html" class="flex flex-col items-center justify-center text-orange-600 dark:text-orange-400 bg-orange-50/50 dark:bg-orange-950/20 rounded-2xl px-4 py-1 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="shopping_cart" style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Compra</span>
        </a>
    </nav>

    <script>
        // Lógica futura para rellenar a partir de los ingredientes del menú
        function generarDesdeMenu() {
            // TODO
        }

        async function fetchLista() {
            const { data, error } = await supabaseClient.from('lista_compra').select('*').order('comprado', { ascending: true }).order('id', { ascending: false });
            return data || [];
        }

        async function renderCompra() {
            const container = document.getElementById('compraContainer');
            
            // Loading
            container.innerHTML = '<div class="text-center text-primary py-4"><span class="material-symbols-outlined animate-spin" style="font-variation-settings: \'FILL\' 0, \'wght\' 400, \'GRAD\' 0, \'opsz\' 24;">refresh</span></div>';
            
            const data = await fetchLista();
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<p class="text-center text-on-surface-variant/70 text-sm py-8 font-body-md">La lista está vacía.</p>';
                return;
            }

            data.forEach(item => {
                const checkedStr = item.comprado ? 'checked' : '';
                const lineThrough = item.comprado ? 'line-through text-on-surface-variant/50' : 'text-on-surface';
                
                const div = document.createElement('div');
                div.className = 'py-[2px] flex items-center justify-between hover:bg-surface-container-low transition-colors rounded-lg px-2 -mx-2 gap-2';
                
                div.innerHTML = `
                    <label class="flex items-center gap-2 flex-1 cursor-pointer group">
                        <div class="relative flex items-center justify-center">
                            <input type="checkbox" onchange="toggleComprado('${item.id}', this.checked)" ${checkedStr} class="peer appearance-none w-5 h-5 border-[1.5px] border-primary rounded-full checked:bg-primary checked:border-primary transition-all cursor-pointer">
                            <span class="material-symbols-outlined absolute text-white opacity-0 peer-checked:opacity-100 pointer-events-none text-[16px]">check</span>
                        </div>
                        <span class="text-[13px] font-medium leading-tight select-none ${lineThrough} transition-all">${item.articulo}</span>
                    </label>
                    <button onclick="deleteArticulo('${item.id}')" class="text-error active:scale-90 transition-transform p-0.5 hover:bg-error/10 rounded-full shrink-0">
                        <span class="material-symbols-outlined text-[18px]" data-icon="delete">delete</span>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        async function addArticulo() {
            const input = document.getElementById('nuevoArticulo');
            const valor = input.value.trim();
            if (!valor) return;

            input.value = ''; // Limpiar rápidamente
            const newId = 'comp_' + Date.now();
            await supabaseClient.from('lista_compra').insert({
                id: newId,
                articulo: valor,
                comprado: false
            });
            renderCompra();
        }

        // Permitir añadir con Enter
        document.getElementById('nuevoArticulo').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addArticulo();
            }
        });

        async function toggleComprado(id, isChecked) {
            await supabaseClient.from('lista_compra').update({ comprado: isChecked }).eq('id', id);
            // El renderizado se actualizará por realtime
            renderCompra();
        }

        async function deleteArticulo(id) {
            await supabaseClient.from('lista_compra').delete().eq('id', id);
            renderCompra();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCompra();
            
            // Realtime Sync
            if (typeof supabaseClient !== 'undefined') {
                supabaseClient
                    .channel('public:lista_compra')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'lista_compra' }, payload => {
                        renderCompra();
                    })
                    .subscribe();
            }
        });
    </script>
</body>
</html>
