<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BMenu — Lista de la Compra</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet"/>

            min-height: max(884px, 100dvh);
        }
    </style>

                      "surface-variant": "#e3e2e0",
                      "secondary-fixed": "#ffdf9e",
                      "on-tertiary-container": "#083323",
                      "on-primary-container": "#511c00",
                      "background": "#faf9f6",
                      "on-secondary-container": "#6c5000",
                      "tertiary-fixed": "#c1ecd4",
                      "error": "#ba1a1a",
                      "primary": "#a14000",
                      "on-tertiary-fixed": "#002114",
                      "on-primary-fixed-variant": "#7b2f00",
                      "on-error": "#ffffff",
                      "surface-tint": "#a14000",
                      "on-primary": "#ffffff",
                      "on-error-container": "#93000a",
                      "surface-container": "#efeeeb",
                      "surface-container-low": "#f4f3f1",
                      "error-container": "#ffdad6",
                      "surface-dim": "#dbdad7",
                      "on-secondary-fixed-variant": "#5b4300",
                      "surface": "#faf9f6",
                      "primary-container": "#f26b1d",
                      "secondary-container": "#fdc003",
                      "on-tertiary-fixed-variant": "#274e3d",
                      "inverse-surface": "#2f312f",
                      "tertiary": "#3f6653",
                      "outline-variant": "#e0c0b2",
                      "primary-fixed": "#ffdbcc",
                      "on-secondary-fixed": "#261a00",
                      "surface-container-lowest": "#ffffff",
                      "on-surface-variant": "#594237",
                      "on-background": "#1a1c1a",
                      "outline": "#8c7166",
                      "inverse-on-surface": "#f2f1ee",
                      "inverse-primary": "#ffb694",
                      "surface-container-highest": "#e3e2e0",
                      "on-tertiary": "#ffffff",
                      "surface-bright": "#faf9f6"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",

                      "xl": "0.75rem",

              "spacing": {

                      "lg": "24px"
              },
              "fontFamily": {

                      "body-lg": ["Be Vietnam Pro"],

                      "headline-md": ["Plus Jakarta Sans"],

                      "display-xl": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],

<body class="bg-background text-on-surface overflow-x-hidden">
    <!-- Contenido HTML simplificado para el ejemplo, mantén tu estructura de UI -->
    <div id="app" class="max-w-md mx-auto p-4">
        <div class="flex flex-col gap-4">
            <input id="nuevoArticulo" type="text" placeholder="Añadir artículo..." class="p-2 border rounded">
            <div id="inputHint" class="text-sm"></div>
            <div id="listaCompraContainer" class="flex flex-col gap-2"></div>
        </div>
    </div>

    <script>
        // Variables de estado global
        let activeSupermercado = 'General'; 
        let currentAllData = []; 
        let lastInputValue = '';

        // Helper para normalizar texto y evitar duplicados por mayúsculas/espacios
        function normalizeArticulo(text) {
            return text.trim().toLowerCase();
        }

        function setInputHint(text, type = 'info') {
            const hintEl = document.getElementById('inputHint');
            if (!hintEl) return;
            hintEl.innerText = text;
            hintEl.className = type === 'error' ? 'text-error text-sm' : 'text-on-surface-variant text-sm';
        }

        // MODIFICACIÓN: Ahora devuelve el objeto del ítem en lugar de un booleano
        function findExistingItemInActiveSupermercado(text) {
            const normalizedText = normalizeArticulo(text);
            return currentAllData.find(item =>
                (item.supermercado_nombre || 'Sin Supermercado') === activeSupermercado &&
                normalizeArticulo(item.articulo) === normalizedText
            );
        }

        async function renderCompra() {
            const container = document.getElementById('listaCompraContainer');
            if (!container) return;

            // Consulta a Supabase con ordenación: No comprados primero, luego los más recientes
            const { data, error } = await supabaseClient
                .from('lista_compra')
                .select('*')
                .eq('supermercado_nombre', activeSupermercado)
                .order('comprado', { ascending: true }) 
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error cargando lista:', error);
                return;
            }

            currentAllData = data;
            container.innerHTML = '';

            data.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'flex items-center justify-between p-2 bg-surface-container rounded-lg';
                const checkedStr = item.comprado ? 'checked' : '';
                const lineThrough = item.comprado ? 'line-through opacity-50' : '';

                itemDiv.innerHTML = `
                    <label class="flex items-center gap-2 flex-1 cursor-pointer">
                        <div class="relative flex items-center justify-center">
                            <input type="checkbox" onchange="toggleComprado('${item.id}', this.checked)" ${checkedStr} class="peer appearance-none w-4 h-4 border-[1.5px] border-primary rounded-full checked:bg-primary checked:border-primary transition-all cursor-pointer">
                            <span class="material-symbols-outlined absolute text-white opacity-0 peer-checked:opacity-100 pointer-events-none text-[14px]">check</span>
                        </div>
                        <span class="text-[12px] font-medium leading-none select-none ${lineThrough} transition-all">${item.articulo}</span>
                    </label>
                    <button onclick="deleteArticulo('${item.id}')" class="text-error active:scale-90 transition-transform p-0.5 hover:bg-error/10 rounded-full shrink-0">
                        <span class="material-symbols-outlined text-[18px]">delete</span>
                    </button>
                `;
                container.appendChild(itemDiv);
            });
        }

        // MODIFICACIÓN: Nueva lógica de inserción y reactivación de artículos
        async function addArticulo() {
            const input = document.getElementById('nuevoArticulo');
            const valor = input.value.trim();
            if (!valor) return;

            // 1. Detectar duplicado
            const existingItem = findExistingItemInActiveSupermercado(valor);

            if (existingItem) {
                // 2. Evaluar estado
                if (existingItem.comprado) {
                    // Caso A: Si ya está marcado como comprado -> DESMARCARLO
                    await supabaseClient
                        .from('lista_compra')
                        .update({ comprado: false })
                        .eq('id', existingItem.id);
                    
                    // Limpiamos el input y el feedback ya que la acción fue exitosa
                    input.value = '';
                    setInputHint('');
                    
                    // Forzamos renderizado para moverlo arriba inmediatamente
                    renderCompra(); 
                    return;
                } else {
                    // Caso B: Ya está activo y no comprado -> Mantener alerta de error
                    setInputHint('Ya existe en esta lista.', 'error');
                    return;
                }
            }

            // Flujo normal: No es duplicado -> Insertar nuevo
            input.value = '';
            setInputHint('');
            lastInputValue = '';
            const newId = 'comp_' + Date.now();
            
            await window.supabaseClient.from('lista_compra').insert({
                id: newId,
                articulo: valor,
                comprado: false,
                supermercado_nombre: activeSupermercado
            });
            
            renderCompra();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const inputEl = document.getElementById('nuevoArticulo');
            if (inputEl) {
                inputEl.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        addArticulo();
                    }
                });
                inputEl.addEventListener('input', () => {
                    // Aquí iría la lógica de updateAutocomplete
                });
            }
            
            renderCompra();
            
            // Realtime Sync
            if (typeof supabaseClient !== 'undefined') {
                supabaseClient
                    .channel('public:lista_compra')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'lista_compra' }, payload => {
                        renderCompra();
                    })
                    .subscribe();
            }
        });

        async function toggleComprado(id, isChecked) {
            await supabaseClient.from('lista_compra').update({ comprado: isChecked }).eq('id', id);
            renderCompra();
        }

        async function deleteArticulo(id) {
            await supabaseClient.from('lista_compra').delete().eq('id', id);
            renderCompra();
        }
    </script>
</body>
</html>
