<!DOCTYPE html>
<html class="light" lang="es">
<head>

    </style>

                      "on-secondary": "#ffffff",
                      "surface-variant": "#e3e2e0",
                      "secondary-fixed": "#ffdf9e",
                      "on-tertiary-container": "#083323",
                      "on-primary-container": "#511c00",
                      "background": "#faf9f6",
                      "on-secondary-container": "#6c5000",
                      "tertiary-fixed": "#c1ecd4",
                      "error": "#ba1a1a",
                      "primary": "#a14000",
                      "on-tertiary-fixed": "#002114",
                      "on-primary-fixed-variant": "#7b2f00",
                      "on-error": "#ffffff",
                      "surface-tint": "#a14000",
                      "on-primary": "#ffffff",
                      "on-error-container": "#93000a",
                      "surface-container": "#efeeeb",

                      "error-container": "#ffdad6",

                      "on-secondary-fixed-variant": "#5b4300",

                      "primary-container": "#f26b1d",
                      "secondary-container": "#fdc003",
                      "on-tertiary-fixed-variant": "#274e3d",
                      "inverse-surface": "#2f312f",
                      "tertiary": "#3f6653",
                      "outline-variant": "#e0c0b2",
                      "primary-fixed": "#ffdbcc",
                      "on-secondary-fixed": "#261a00",
                      "surface-container-lowest": "#ffffff",
                      "on-surface-variant": "#594237",
                      "on-background": "#1a1c1a",
                      "outline": "#8c7166",
                      "inverse-on-surface": "#f2f1ee",
                      "inverse-primary": "#ffb694",
                      "surface-container-highest": "#e3e2e0",
                      "on-tertiary": "#ffffff",

              },
              "fontSize": {
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],

</head>
<body class="bg-surface text-on-surface antialiased min-h-screen pb-32">
    <!-- TopAppBar -->
    <header class="bg-white/90 dark:bg-gray-950/90 backdrop-blur-md docked full-width top-0 z-50 border-b border-orange-100/50 dark:border-gray-800 shadow-[0_4px_20px_-4px_rgba(242,107,29,0.05)] flex items-center justify-between px-6 py-4 w-full sticky">
        <div class="flex items-center gap-4">
            <h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-orange-600 dark:text-orange-400">Lista de la Compra</h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="window.location.href='gestion-tiendas.html'" class="text-orange-600 dark:text-orange-400 hover:bg-orange-50 dark:hover:bg-orange-950/30 p-2 rounded-full transition-colors active:scale-90 flex items-center justify-center" aria-label="Gestionar tiendas">
                <span class="material-symbols-outlined" data-icon="store">store</span>
            </button>
            <div class="h-10 w-10 rounded-full overflow-hidden border-2 border-primary-container active:scale-95 transition-transform duration-200 ease-out">
                <img alt="Usuario" src="MiFoto.jpg" class="w-full h-full object-cover"/>
            </div>
        </div>
    </header>

    <main class="px-margin-mobile pt-lg max-w-md mx-auto pb-4">
        
        <!-- Supermarket Tabs Grid -->
        <div id="supermercadoTabs" class="grid grid-cols-3 gap-1 mb-3">
            <!-- Renderizado dinámicamente -->
        </div>

        <!-- Add Item Input -->
        <div class="flex items-center gap-1 mb-1 bg-surface-container-lowest rounded-xl p-1 shadow-sm border border-outline-variant/30">
            <input type="text" id="nuevoArticulo" class="w-full bg-transparent border-none focus:ring-0 text-on-surface text-[13px] placeholder-on-surface-variant/60 py-1 px-2" placeholder="Añadir a la lista...">
            <button onclick="addArticulo()" class="w-8 h-8 flex items-center justify-center bg-primary text-on-primary rounded-lg active:scale-90 transition-transform shrink-0">
                <span class="material-symbols-outlined text-[18px]">add</span>
            </button>
        </div>
        <div id="inputHint" class="mb-3 min-h-[18px] text-[11px] text-on-surface-variant"></div>

        <!-- Items List -->
        <div id="compraContainer" class="flex flex-col gap-0">
            <!-- Renderizado dinámicamente -->
        </div>

    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-white/95 dark:bg-gray-950/95 backdrop-blur-lg rounded-t-[32px] border-t border-orange-50 dark:border-gray-800 shadow-[0_-10px_40px_-15px_rgba(242,107,29,0.08)]">
        <a href="index.html" class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-orange-300 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Menú</span>
        </a>
        <a href="platos.html" class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-orange-300 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="restaurant">restaurant</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Platos</span>
        </a>
        <a href="Almacen.html" class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-orange-300 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Almacén</span>
        </a>
        <a href="compra.html" class="flex flex-col items-center justify-center text-orange-600 dark:text-orange-400 bg-orange-50/50 dark:bg-orange-950/20 rounded-2xl px-4 py-1 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="shopping_cart" style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Compra</span>
        </a>
    </nav>

    <script>
        let activeSupermercado = null;
        let allSupermercados = [];
        let currentAllData = [];
        let autocompleteSuspended = false;
        let lastInputValue = '';

        function suspendAutocomplete() {
            autocompleteSuspended = true;
            setInputHint('');
        }

        function resumeAutocomplete() {
            autocompleteSuspended = false;
        }

        function normalizeArticulo(text) {
            return (text || '').trim().toLowerCase();
        }

        function setInputHint(message, tone = 'neutral') {
            const hint = document.getElementById('inputHint');
            if (!hint) return;
            hint.textContent = message || '';
            hint.className = `mb-3 min-h-[18px] text-[11px] ${
                tone === 'error' ? 'text-error' : 'text-on-surface-variant'
            }`;
        }

        function findAutocompleteSuggestion(prefix) {
            const normalizedPrefix = normalizeArticulo(prefix);
            if (!normalizedPrefix) return null;

            const candidates = Array.from(new Set(currentAllData
                .map(item => item.articulo || '')
                .filter(Boolean)
            ));

            candidates.sort((a, b) => a.localeCompare(b, 'es', { sensitivity: 'base' }));

            return candidates.find(name => {
                const normalizedName = normalizeArticulo(name);
                return normalizedName.startsWith(normalizedPrefix) && normalizedName !== normalizedPrefix;
            }) || null;
        }

        function itemExistsInActiveSupermercado(text) {
            const normalizedText = normalizeArticulo(text);
            return currentAllData.some(item =>
                (item.supermercado_nombre || 'Sin Supermercado') === activeSupermercado &&
                normalizeArticulo(item.articulo) === normalizedText
            );
        }

        function updateAutocomplete(event) {
            const input = document.getElementById('nuevoArticulo');
            if (!input) return;

            const inputType = event && event.inputType ? event.inputType : '';
            const currentValue = input.value;
            const valueShrank = currentValue.length < lastInputValue.length;
            const isDelete = inputType.startsWith('delete') || autocompleteSuspended || valueShrank;

            if (inputType.startsWith('insert')) {
                resumeAutocomplete();
            }

            if (isDelete) {
                lastInputValue = currentValue;
                if (input.selectionStart !== input.selectionEnd) {
                    input.setSelectionRange(currentValue.length, currentValue.length);
                }
                return;
            }

            const value = currentValue;
            const selectionStart = input.selectionStart;
            const selectionEnd = input.selectionEnd;
            const normalizedValue = normalizeArticulo(value);

            if (!normalizedValue) {
                setInputHint('');
                return;
            }

            if (itemExistsInActiveSupermercado(value)) {
                setInputHint('Ya existe en esta lista.', 'error');
                return;
            }

            const suggestion = findAutocompleteSuggestion(value);
            if (!suggestion) {
                setInputHint('');
                return;
            }

            if (selectionStart !== selectionEnd || selectionStart !== value.length) {
                setInputHint(`Sugerencia: ${suggestion}`);
                return;
            }

            if (suggestion.toLowerCase() === value.toLowerCase()) {
                setInputHint('');
                return;
            }

            input.value = suggestion;
            resumeAutocomplete();
            input.setSelectionRange(value.length, suggestion.length);
            lastInputValue = input.value;
            setInputHint(`Sugerencia: ${suggestion}`);
            return;
        }

        function syncAutocompleteValue() {
            const input = document.getElementById('nuevoArticulo');
            if (!input) return;
            lastInputValue = input.value;
        }

        async function fetchSupermercados() {
            const { data, error } = await window.supabaseClient.from('supermercados').select('*').order('id', { ascending: true });
            return data || [];
        }

        async function loadSupermercados() {
            allSupermercados = await fetchSupermercados();
            
            // Si no hay supermercados, añadir "Sin Supermercado"
            if (allSupermercados.length === 0) {
                allSupermercados = [{ id: 'default', nombre: 'Sin Supermercado' }];
            }
            
            // Establecer el primero como activo
            activeSupermercado = allSupermercados[0].nombre;
            
            renderTabs();
            renderCompra();
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('supermercadoTabs');
            tabsContainer.innerHTML = '';
            
            allSupermercados.forEach(super_ => {
                const btn = document.createElement('button');
                const nombre = super_.nombre;
                const isActive = activeSupermercado === nombre;
                
                btn.className = `py-2 px-2 rounded-lg font-semibold text-xs uppercase tracking-wide transition-all active:scale-95 text-center ${
                    isActive 
                        ? 'bg-primary text-on-primary shadow-sm' 
                        : 'bg-surface-container text-on-surface-variant hover:bg-surface-container-low'
                }`;
                btn.textContent = nombre;
                btn.onclick = () => {
                    activeSupermercado = nombre;
                    renderTabs();
                    renderCompra();
                };
                
                tabsContainer.appendChild(btn);
            });
        }

        async function fetchLista() {
            const { data, error } = await supabaseClient.from('lista_compra').select('*').order('comprado', { ascending: true }).order('articulo', { ascending: true });
            return data || [];
        }

        async function renderCompra() {
            const container = document.getElementById('compraContainer');
            
            // Loading
            container.innerHTML = '<div class="text-center text-primary py-4"><span class="material-symbols-outlined animate-spin" style="font-variation-settings: \'FILL\' 0, \'wght\' 400, \'GRAD\' 0, \'opsz\' 24;">refresh</span></div>';
            
            const allData = await fetchLista();
            currentAllData = allData;
            setInputHint('');
            container.innerHTML = '';

            // Filtrar por supermercado activo
            const filteredData = allData.filter(item => 
                (item.supermercado_nombre || 'Sin Supermercado') === activeSupermercado
            );

            if (filteredData.length === 0) {
                container.innerHTML = '<p class="text-center text-on-surface-variant/70 text-sm py-8 font-body-md">No hay elementos en este supermercado.</p>';
                return;
            }

            // Ordenar: primero sin marcar (alfabéticamente), luego marcados (alfabéticamente)
            filteredData.sort((a, b) => {
                if (a.comprado !== b.comprado) return a.comprado ? 1 : -1;
                return (a.articulo || '').localeCompare(b.articulo || '', 'es', { sensitivity: 'base' });
            });

            // Renderizar items
            filteredData.forEach(item => {
                const checkedStr = item.comprado ? 'checked' : '';
                const lineThrough = item.comprado ? 'line-through text-on-surface-variant/50' : 'text-on-surface';
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'py-1 flex items-center justify-between hover:bg-surface-container-low transition-colors rounded-xl px-1 -mx-1 gap-1';
                
                itemDiv.innerHTML = `
                    <label class="flex items-center gap-2 flex-1 cursor-pointer">
                        <div class="relative flex items-center justify-center">
                            <input type="checkbox" onchange="toggleComprado('${item.id}', this.checked)" ${checkedStr} class="peer appearance-none w-4 h-4 border-[1.5px] border-primary rounded-full checked:bg-primary checked:border-primary transition-all cursor-pointer">
                            <span class="material-symbols-outlined absolute text-white opacity-0 peer-checked:opacity-100 pointer-events-none text-[14px]">check</span>
                        </div>
                        <span class="text-[12px] font-medium leading-none select-none ${lineThrough} transition-all">${item.articulo}</span>
                    </label>
                    <button onclick="deleteArticulo('${item.id}')" class="text-error active:scale-90 transition-transform p-0.5 hover:bg-error/10 rounded-full shrink-0">
                        <span class="material-symbols-outlined text-[18px]">delete</span>
                    </button>
                `;
                
                container.appendChild(itemDiv);
            });
        }

        async function addArticulo() {
            const input = document.getElementById('nuevoArticulo');
            const valor = input.value.trim();
            if (!valor) return;

            if (itemExistsInActiveSupermercado(valor)) {
                setInputHint('Ya existe en esta lista.', 'error');
                return;
            }

            input.value = '';
            setInputHint('');
            lastInputValue = '';
            const newId = 'comp_' + Date.now();
            await window.supabaseClient.from('lista_compra').insert({
                id: newId,
                articulo: valor,
                comprado: false,
                supermercado_nombre: activeSupermercado
            });
            renderCompra();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const inputEl = document.getElementById('nuevoArticulo');
            if (inputEl) {
                inputEl.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' || e.key === 'Delete') {
                        const selectionStart = inputEl.selectionStart || 0;
                        const selectionEnd = inputEl.selectionEnd || 0;
                        const hasSuggestionSelection = selectionStart !== selectionEnd && selectionEnd === inputEl.value.length;

                        if (hasSuggestionSelection) {
                            e.preventDefault();
                            inputEl.value = inputEl.value.slice(0, selectionStart);
                            inputEl.setSelectionRange(selectionStart, selectionStart);
                            lastInputValue = inputEl.value;
                        }

                        suspendAutocomplete();
                        return;
                    }

                    if (e.key.length === 1) {
                        resumeAutocomplete();
                    }
                });

                inputEl.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        addArticulo();
                    }
                });
                inputEl.addEventListener('beforeinput', function(e) {
                    if (e.inputType && e.inputType.startsWith('delete')) {
                        suspendAutocomplete();
                    }

                    if (e.inputType && e.inputType.startsWith('insert')) {
                        resumeAutocomplete();
                    }
                });
                inputEl.addEventListener('input', updateAutocomplete);
                inputEl.addEventListener('focus', syncAutocompleteValue);
                inputEl.addEventListener('blur', syncAutocompleteValue);
            }
            
            loadSupermercados();
            
            // Realtime Sync
            if (typeof supabaseClient !== 'undefined') {
                supabaseClient
                    .channel('public:lista_compra')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'lista_compra' }, payload => {
                        renderCompra();
                    })
                    .subscribe();
            }
        });

        async function toggleComprado(id, isChecked) {
            await supabaseClient.from('lista_compra').update({ comprado: isChecked }).eq('id', id);
            renderCompra();
        }

        async function deleteArticulo(id) {
            await supabaseClient.from('lista_compra').delete().eq('id', id);
            renderCompra();
        }
    </script>
</body>
