<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="108" fill="#FAF9F6"/>
  <rect x="20" y="20" width="472" height="472" rx="92" fill="#F26B1D" opacity="0.1"/>
  <!-- Plate -->
  <circle cx="256" cy="270" r="140" fill="none" stroke="#F26B1D" stroke-width="6" opacity="0.3"/>
  <circle cx="256" cy="270" r="108" fill="none" stroke="#F26B1D" stroke-width="4" opacity="0.15"/>
  <!-- Fork -->
  <g transform="translate(192, 155)">
    <line x1="0" y1="0" x2="0" y2="215" stroke="#F26B1D" stroke-width="10" stroke-linecap="round"/>
    <line x1="-20" y1="0" x2="-20" y2="65" stroke="#F26B1D" stroke-width="7" stroke-linecap="round"/>
    <line x1="20" y1="0" x2="20" y2="65" stroke="#F26B1D" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- Knife -->
  <g transform="translate(320, 155)">
    <line x1="0" y1="16" x2="0" y2="215" stroke="#A14000" stroke-width="10" stroke-linecap="round"/>
    <path d="M0,0 Q22,32 0,75" fill="none" stroke="#A14000" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- Calendar dots (7 days) -->
  <g fill="#F26B1D" opacity="0.5">
    <circle cx="148" cy="432" r="8"/><circle cx="184" cy="432" r="8"/>
    <circle cx="220" cy="432" r="8"/><circle cx="256" cy="432" r="8"/>
    <circle cx="292" cy="432" r="8"/><circle cx="328" cy="432" r="8"/>
    <circle cx="364" cy="432" r="8"/>
  </g>
  <!-- B letter -->
  <text x="256" y="122" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-weight="800" font-size="76" fill="#A14000" opacity="0.85">B</text>
</svg>
