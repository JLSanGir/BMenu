<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BMenu — Compra Básica Semanal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            min-height: max(884px, 100dvh);
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-fixed-dim": "#a5d0b9",
                      "tertiary-container": "#749d87",
                      "on-primary-fixed": "#351000",
                      "secondary-fixed-dim": "#fabd00",
                      "primary-fixed-dim": "#ffb694",
                      "surface-container-high": "#e9e8e5",
                      "on-surface": "#1a1c1a",
                      "secondary": "#785900",
                      "on-secondary": "#ffffff",
                      "surface-variant": "#e3e2e0",
                      "secondary-fixed": "#ffdf9e",
                      "on-tertiary-container": "#083323",
                      "on-primary-container": "#511c00",
                      "background": "#faf9f6",
                      "on-secondary-container": "#6c5000",
                      "tertiary-fixed": "#c1ecd4",
                      "error": "#ba1a1a",
                      "primary": "#a14000",
                      "on-tertiary-fixed": "#002114",
                      "on-primary-fixed-variant": "#7b2f00",
                      "on-error": "#ffffff",
                      "surface-tint": "#a14000",
                      "on-primary": "#ffffff",
                      "on-error-container": "#93000a",
                      "surface-container": "#efeeeb",
                      "surface-container-low": "#f4f3f1",
                      "error-container": "#ffdad6",
                      "surface-dim": "#dbdad7",
                      "on-secondary-fixed-variant": "#5b4300",
                      "surface": "#faf9f6",
                      "primary-container": "#f26b1d",
                      "secondary-container": "#fdc003",
                      "on-tertiary-fixed-variant": "#274e3d",
                      "inverse-surface": "#2f312f",
                      "tertiary": "#3f6653",
                      "outline-variant": "#e0c0b2",
                      "primary-fixed": "#ffdbcc",
                      "on-secondary-fixed": "#261a00",
                      "surface-container-lowest": "#ffffff",
                      "on-surface-variant": "#594237",
                      "on-background": "#1a1c1a",
                      "outline": "#8c7166",
                      "inverse-on-surface": "#f2f1ee",
                      "inverse-primary": "#ffb694",
                      "surface-container-highest": "#e3e2e0",
                      "on-tertiary": "#ffffff",
                      "surface-bright": "#faf9f6"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "md": "16px",
                      "margin-desktop": "64px",
                      "sm": "8px",
                      "margin-mobile": "20px",
                      "xl": "40px",
                      "unit": "4px",
                      "xs": "4px",
                      "gutter": "16px",
                      "lg": "24px"
              },
              "fontFamily": {
                      "body-md": ["Be Vietnam Pro"],
                      "body-lg": ["Be Vietnam Pro"],
                      "headline-lg": ["Plus Jakarta Sans"],
                      "headline-md": ["Plus Jakarta Sans"],
                      "label-md": ["Be Vietnam Pro"],
                      "display-xl": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                      "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                      "display-xl": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}]
              }
            },
          },
        }
    </script>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen pb-40">
    <!-- TopAppBar -->
    <header class="bg-white/90 dark:bg-gray-950/90 backdrop-blur-md docked full-width top-0 z-50 border-b border-orange-100/50 dark:border-gray-800 shadow-[0_4px_20px_-4px_rgba(242,107,29,0.05)] flex items-center justify-between px-6 py-4 w-full sticky">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='compra.html'" class="h-10 w-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95 text-on-surface-variant">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-orange-600 dark:text-orange-400">Compra Básica Semanal</h1>
        </div>
    </header>

    <main class="px-margin-mobile pt-lg max-w-md mx-auto">
        
        <!-- Add Item -->
        <div class="flex items-center gap-1 mb-4 bg-surface-container-lowest rounded-xl p-1.5 shadow-sm border border-outline-variant/30">
            <input type="text" id="nuevoBasico" class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface text-[14px] placeholder-on-surface-variant/60 py-1 px-2" placeholder="Añadir básico (ej: Leche)...">
            <button onclick="addBasico()" class="w-8 h-8 flex items-center justify-center bg-primary text-on-primary rounded-lg active:scale-90 transition-transform shrink-0">
                <span class="material-symbols-outlined text-[20px]">add</span>
            </button>
        </div>

        <!-- List -->
        <div id="basicosContainer" class="flex flex-col gap-2">
            <!-- Renderizado dinámicamente -->
        </div>

    </main>

    <!-- Bottom Actions -->
    <div class="fixed bottom-0 left-0 w-full z-50 px-4 py-4 pb-safe bg-white/95 dark:bg-gray-950/95 backdrop-blur-lg rounded-t-[32px] border-t border-orange-50 dark:border-gray-800 shadow-[0_-10px_40px_-15px_rgba(242,107,29,0.08)]">
        <div class="max-w-md mx-auto flex flex-col gap-3">
            <button onclick="addToCompra()" id="btnAñadir" class="w-full h-12 bg-primary text-on-primary rounded-full font-label-md flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-md">
                <span class="material-symbols-outlined text-[20px]">shopping_cart_checkout</span>
                Añadir a la compra
            </button>
            <button onclick="window.location.href='compra.html'" class="w-full h-12 bg-surface-variant text-on-surface-variant rounded-full font-label-md flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <span class="material-symbols-outlined text-[20px]">close</span>
                Cancelar
            </button>
        </div>
    </div>

    <script>
        async function fetchBasicos() {
            const { data, error } = await supabaseClient.from('basicos_compra').select('*').order('id', { ascending: false });
            if (error) {
                console.error("Error fetching basicos:", error.message);
                return [];
            }
            return data || [];
        }

        async function renderBasicos() {
            const container = document.getElementById('basicosContainer');
            
            // Loading
            container.innerHTML = '<div class="text-center text-primary py-4"><span class="material-symbols-outlined animate-spin" style="font-variation-settings: \'FILL\' 0, \'wght\' 400, \'GRAD\' 0, \'opsz\' 24;">refresh</span></div>';
            
            const data = await fetchBasicos();
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<p class="text-center text-on-surface-variant/70 text-sm py-8 font-body-md">No tienes artículos básicos definidos.</p>';
                return;
            }

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'py-[2px] flex items-center justify-between hover:bg-surface-container-low transition-colors rounded-lg px-2 -mx-2 gap-2';
                
                div.innerHTML = `
                    <div class="flex items-center gap-2 flex-1">
                        <span class="text-[13px] font-medium leading-tight select-none text-on-surface transition-all">${item.articulo}</span>
                    </div>
                    <button onclick="deleteBasico('${item.id}')" class="text-error active:scale-90 transition-transform p-0.5 hover:bg-error/10 rounded-full shrink-0">
                        <span class="material-symbols-outlined text-[18px]" data-icon="delete">delete</span>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        async function addBasico() {
            const input = document.getElementById('nuevoBasico');
            const valor = input.value.trim();
            if (!valor) return;

            const { error } = await window.supabaseClient.from('basicos_compra').insert([{ 
                articulo: valor 
            }]);

            if (error) {
                console.error("Error al añadir básico:", error.message);
                alert("Hubo un error al añadir el artículo: " + error.message);
            } else {
                input.value = '';
                await renderBasicos();
            }
        }

        // Permitir añadir con Enter
        document.getElementById('nuevoBasico').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addBasico();
            }
        });

        async function deleteBasico(id) {
            const { error } = await supabaseClient.from('basicos_compra').delete().eq('id', id);
            if (error) console.error("Error deleting basico:", error.message);
            renderBasicos();
        }

        async function addToCompra() {
            const btn = document.getElementById('btnAñadir');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[20px]">refresh</span> Procesando...';
            btn.disabled = true;

            const basicos = await fetchBasicos();
            if (basicos.length > 0) {
                const itemsToInsert = basicos.map((item, index) => ({
                    id: 'comp_' + Date.now() + '_' + index,
                    articulo: item.articulo,
                    comprado: false
                }));

                const { error } = await supabaseClient.from('lista_compra').insert(itemsToInsert);
                if (error) {
                    console.error("Error al añadir a la compra:", error.message);
                    alert("Hubo un error al añadir los artículos.");
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                    return;
                }
            }

            // Volver a la pantalla de compra
            window.location.href = 'compra.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderBasicos();
            
            // Realtime Sync
            if (typeof window.supabaseClient !== 'undefined') {
                window.supabaseClient
                    .channel('public:basicos_compra')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'basicos_compra' }, payload => {
                        renderBasicos();
                    })
                    .subscribe();
            }
        });
    </script>
</body>
</html>
