<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BMenu — Ingredientes del Plato</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            min-height: max(884px, 100dvh);
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-high": "#e9e8e5",
                      "on-surface": "#1a1c1a",
                      "surface-variant": "#e3e2e0",
                      "background": "#faf9f6",
                      "error": "#ba1a1a",
                      "primary": "#a14000",
                      "on-error": "#ffffff",
                      "on-primary": "#ffffff",
                      "surface-container": "#efeeeb",
                      "surface-container-low": "#f4f3f1",
                      "surface": "#faf9f6",
                      "primary-container": "#f26b1d",
                      "surface-container-lowest": "#ffffff",
                      "on-surface-variant": "#594237",
                      "on-background": "#1a1c1a",
                      "outline": "#8c7166",
                      "surface-bright": "#faf9f6"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "md": "16px",
                      "margin-mobile": "20px",
                      "sm": "8px",
                      "xs": "4px",
                      "lg": "24px"
              },
              "fontFamily": {
                      "body-md": ["Be Vietnam Pro"],
                      "headline-lg": ["Plus Jakarta Sans"],
                      "headline-md": ["Plus Jakarta Sans"],
                      "label-md": ["Be Vietnam Pro"]
              }
            },
          },
        }
    </script>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen pb-32">
    <!-- TopAppBar -->
    <header class="bg-white/90 dark:bg-gray-950/90 backdrop-blur-md docked full-width top-0 z-50 border-b border-orange-100/50 dark:border-gray-800 shadow-[0_4px_20px_-4px_rgba(242,107,29,0.05)] flex items-center px-6 py-4 w-full sticky">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='platos.html'" class="active:scale-95 transition-transform duration-200 ease-out text-orange-600 dark:text-orange-400">
                <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
            </button>
            <h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-orange-600 dark:text-orange-400">Ingredientes</h1>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="px-margin-mobile pt-lg max-w-md mx-auto">
        <div class="flex flex-col gap-sm mb-lg">
            <h2 id="platoNameLabel" class="font-headline-lg text-primary text-headline-lg leading-tight">Cargando...</h2>
        </div>
        
        <!-- Add Form -->
        <div class="bg-surface-container-lowest p-4 rounded-2xl shadow-sm border border-surface-variant/50 mb-lg flex items-center gap-2">
            <div class="flex-1 flex flex-col gap-2">
                <input type="text" id="ingredienteNombre" class="w-full rounded-lg border-outline-variant/50 border bg-surface p-2 text-sm focus:ring-primary focus:border-primary transition-all text-on-surface" placeholder="Ingrediente (ej. Tomate)">
                <input type="text" id="ingredienteCantidad" class="w-full rounded-lg border-outline-variant/50 border bg-surface p-2 text-sm focus:ring-primary focus:border-primary transition-all text-on-surface" placeholder="Cantidad opcional (ej. 200g)">
            </div>
            <button onclick="addIngrediente()" class="bg-primary text-on-primary p-3 rounded-xl shadow-md hover:bg-primary-container active:scale-90 transition-all flex items-center justify-center h-full">
                <span class="material-symbols-outlined font-bold">add</span>
            </button>
        </div>

        <div class="bg-surface-container-lowest rounded-2xl shadow-sm border border-surface-variant/50 overflow-hidden">
            <div class="px-4 py-3 bg-surface-container-low border-b border-surface-variant/50">
                <h3 class="font-label-md text-sm text-on-surface-variant uppercase tracking-wider">Lista de ingredientes</h3>
            </div>
            <div id="ingredientesContainer" class="flex flex-col divide-y divide-surface-variant/50 p-2">
                <!-- Ingredientes se renderizan aquí -->
            </div>
        </div>
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-white/95 dark:bg-gray-950/95 backdrop-blur-lg rounded-t-[32px] border-t border-orange-50 dark:border-gray-800 shadow-[0_-10px_40px_-15px_rgba(242,107,29,0.08)]">
        <a href="index.html" class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-orange-300 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Menú</span>
        </a>
        <a href="platos.html" class="flex flex-col items-center justify-center text-orange-600 dark:text-orange-400 bg-orange-50/50 dark:bg-orange-950/20 rounded-2xl px-4 py-1 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="restaurant" style="font-variation-settings: 'FILL' 1;">restaurant</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Platos</span>
        </a>
        <a href="Almacen.html" class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-orange-300 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Almacén</span>
        </a>
        <a href="compra.html" class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-orange-300 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="shopping_cart">shopping_cart</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Compra</span>
        </a>
    </nav>

    <script>
        let platoActual = null;

        document.addEventListener('DOMContentLoaded', () => {
            const platoActivoStr = localStorage.getItem('platoActivo');
            if (!platoActivoStr) {
                window.location.href = 'platos.html';
                return;
            }

            try {
                platoActual = JSON.parse(platoActivoStr);
                document.getElementById('platoNameLabel').textContent = platoActual.nombre;
                renderIngredientes();

                if (typeof window.supabaseClient !== 'undefined') {
                    window.supabaseClient
                        .channel('public:ingredientes_plato')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'ingredientes_plato' }, payload => {
                            renderIngredientes();
                        })
                        .subscribe();
                }
            } catch (e) {
                window.location.href = 'platos.html';
            }
        });

        async function fetchIngredientes() {
            if (!platoActual) return [];
            const { data, error } = await window.supabaseClient
                .from('ingredientes_plato')
                .select('*')
                .eq('plato_id', platoActual.id)
                .order('nombre', { ascending: true });
                
            if (error) {
                console.error("Error fetching ingredients:", error);
                return [];
            }
            return data || [];
        }

        async function renderIngredientes() {
            const container = document.getElementById('ingredientesContainer');
            container.innerHTML = '<div class="text-center text-primary py-4"><span class="material-symbols-outlined animate-spin">refresh</span></div>';
            
            const ingredientes = await fetchIngredientes();
            
            if (ingredientes.length === 0) {
                container.innerHTML = '<div class="text-center text-on-surface-variant text-sm py-6">No hay ingredientes registrados.</div>';
                return;
            }

            let html = '';
            ingredientes.forEach(ing => {
                html += `
                    <div class="flex items-center justify-between py-2 px-2 hover:bg-surface-container-low transition-colors rounded-lg">
                        <div class="flex flex-col">
                            <span class="font-body-md text-on-surface font-medium">${ing.nombre}</span>
                            ${ing.cantidad ? `<span class="text-xs text-on-surface-variant">${ing.cantidad}</span>` : ''}
                        </div>
                        <button onclick="deleteIngrediente('${ing.id}')" class="text-outline hover:text-error active:scale-90 transition-transform p-2 rounded-full">
                            <span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
                        </button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        async function addIngrediente() {
            const nombreInput = document.getElementById('ingredienteNombre');
            const cantidadInput = document.getElementById('ingredienteCantidad');
            const nombre = nombreInput.value.trim();
            const cantidad = cantidadInput.value.trim();

            if (!nombre) {
                alert('El nombre del ingrediente es obligatorio.');
                return;
            }

            const newId = 'ing_' + Date.now();
            const { error } = await window.supabaseClient.from('ingredientes_plato').insert({
                id: newId,
                plato_id: platoActual.id,
                nombre: nombre,
                cantidad: cantidad || null
            });

            if (error) {
                console.error("Error adding ingredient:", error);
                alert("Hubo un error al guardar el ingrediente.");
                return;
            }

            nombreInput.value = '';
            cantidadInput.value = '';
            renderIngredientes();
        }

        async function deleteIngrediente(id) {
            if (confirm('¿Eliminar este ingrediente?')) {
                const { error } = await window.supabaseClient.from('ingredientes_plato').delete().eq('id', id);
                if (error) {
                    console.error("Error deleting ingredient:", error);
                    alert("Error al eliminar.");
                } else {
                    renderIngredientes();
                }
            }
        }
    </script>
</body>
</html>
