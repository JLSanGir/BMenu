<body class="bg-surface text-on-surface antialiased min-h-screen pb-32">
    <!-- TopAppBar -->
    <header class="bg-white/90 dark:bg-gray-950/90 backdrop-blur-md docked full-width top-0 z-50 border-b border-orange-100/50 dark:border-gray-800 shadow-[0_4px_20px_-4px_rgba(242,107,29,0.05)] flex items-center justify-between px-6 py-4 w-full sticky">
        <div class="flex items-center gap-4">
            <h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-orange-600 dark:text-orange-400">Menú Semanal</h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="shareMenuWhatsApp()" class="text-orange-600 dark:text-orange-400 hover:bg-orange-50 dark:hover:bg-orange-950/30 p-2 rounded-full transition-colors active:scale-90 flex items-center justify-center" aria-label="Compartir menú por WhatsApp">
                <span class="material-symbols-outlined" data-icon="share">share</span>
            </button>
            <div class="h-10 w-10 rounded-full overflow-hidden border-2 border-primary-container active:scale-95 transition-transform duration-200 ease-out">
                <img alt="Usuario" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBaPBYv0WQ-z_JYvPEMuieGwZT26ZVMvOIaQMtwGNz1f7Chn18328KYWrjEGeKXTINzNZqGnX0vGhJm_fjNjlFUtgRWU8mzVuJnDh4ysBOQPav3B_zRAKVM02AMvxXIFD7HmB47h8O8s04JMQB4Wi_txVhoycAiDuyzfMsyF3_qdvC4YG8oneo4Psowsbtol6uR8qnYx39UiEOOOatpHHOHnW3kfBI7_qiT8MJHr4052jjmRwBUnaa92RvF4PZQjxNH0Eqo4uBm6zWY"/>
            </div>
        </div>
    </header>

    <main class="px-margin-mobile pt-lg max-w-md mx-auto">
        <!-- Navegación de Semanas -->
        <div class="flex items-center justify-between mb-lg bg-surface-container-low rounded-2xl p-2 shadow-sm border border-outline-variant/30">
            <button id="prevWeekBtn" class="p-2 text-primary hover:bg-primary/10 rounded-full transition-colors active:scale-90">
                <span class="material-symbols-outlined">chevron_left</span>
            </button>
            <div class="text-center flex-1">
                <h2 id="weekLabel" class="font-headline-md text-primary text-base m-0 leading-tight">Semana Actual</h2>
                <span id="dateRangeLabel" class="font-label-md text-on-surface-variant text-[11px] uppercase tracking-wider"></span>
            </div>
            <button id="nextWeekBtn" class="p-2 text-primary hover:bg-primary/10 rounded-full transition-colors active:scale-90">
                <span class="material-symbols-outlined">chevron_right</span>
            </button>
        </div>

        <div id="weeklyContainer" class="flex flex-col gap-2">
            <!-- Renderizado dinámicamente -->
        </div>
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-white/95 dark:bg-gray-950/95 backdrop-blur-lg rounded-t-[32px] border-t border-orange-50 dark:border-gray-800 shadow-[0_-10px_40px_-15px_rgba(242,107,29,0.08)]">
        <a href="index.html" class="flex flex-col items-center justify-center text-orange-600 dark:text-orange-400 bg-orange-50/50 dark:bg-orange-950/20 rounded-2xl px-4 py-1 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="calendar_month" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Menú</span>
        </a>
        <a href="platos.html" class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-orange-300 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="restaurant">restaurant</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Platos</span>
        </a>
        <a href="Almacen.html" class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-orange-300 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Almacén</span>
        </a>
    </nav>

    <script>
        const dias = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'];
        const tiposComida = ['COMIDA 1º', 'COMIDA 2º', 'CENA'];
        let weekOffset = 0; // 0 = actual, -1 = anterior, 1 = siguiente

        function getWeekInfo(offset) {
            const today = new Date();
            // Ir al lunes de la semana actual
            const day = today.getDay();
            const diffToMonday = today.getDate() - day + (day === 0 ? -6 : 1);
            let monday = new Date(today.setDate(diffToMonday));
            monday.setDate(monday.getDate() + (offset * 7));
            
            let sunday = new Date(monday);
            sunday.setDate(sunday.getDate() + 6);

            const formatOpt = { day: 'numeric', month: 'short' };
            const dateRange = `${monday.toLocaleDateString('es-ES', formatOpt)} - ${sunday.toLocaleDateString('es-ES', formatOpt)}`;
            
            // Ej: "Semana_18_2026"
            // Get ISO week number
            const target = new Date(monday.valueOf());
            const dayNr = (monday.getDay() + 6) % 7;
            target.setDate(target.getDate() - dayNr + 3);
            const firstThursday = target.valueOf();
            target.setMonth(0, 1);
            if (target.getDay() !== 4) {
                target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
            }
            const weekNumber = 1 + Math.ceil((firstThursday - target) / 604800000);
            
            const weekId = `Semana_${weekNumber}_${monday.getFullYear()}`;
            
            return { weekId, dateRange };
        }

        async function removePlato(weekId, slotId) {
            const id = `${weekId}_${slotId}`;
            await supabase.from('menu').delete().eq('id', id);
            localStorage.setItem('semanaVisualizada', weekId);
            renderWeek();
        }

        function handleSelectPlato(weekId, slotId) {
            localStorage.setItem('semanaVisualizada', weekId);
            localStorage.setItem('slotSeleccionado', JSON.stringify({ weekId, slotId }));
            window.location.href = 'platos.html';
        }

        async function renderWeek() {
            const { weekId, dateRange } = getWeekInfo(weekOffset);
            
            // Labels
            let weekTitle = 'Semana Actual';
            if (weekOffset === -1) weekTitle = 'Semana Anterior';
            if (weekOffset === 1) weekTitle = 'Semana Siguiente';
            if (weekOffset < -1 || weekOffset > 1) weekTitle = `Semana ${weekId.split('_')[1]}`;
            
            document.getElementById('weekLabel').textContent = weekTitle;
            document.getElementById('dateRangeLabel').textContent = dateRange;

            const container = document.getElementById('weeklyContainer');
            container.innerHTML = '<div class="text-center text-primary py-4"><span class="material-symbols-outlined animate-spin" style="font-variation-settings: \'FILL\' 0, \'wght\' 400, \'GRAD\' 0, \'opsz\' 24;">refresh</span></div>';

            const { data, error } = await supabase
                .from('menu')
                .select('*')
                .eq('week_id', weekId);
                
            let weekData = {};
            if (data && !error) {
                data.forEach(row => {
                    weekData[row.slot_id] = { nombre: row.plato_nombre };
                });
            }

            container.innerHTML = '';

            dias.forEach(dia => {
                const diaCard = document.createElement('div');
                diaCard.className = 'bg-surface-container-lowest rounded-lg p-2 border border-surface-variant shadow-sm';
                
                let html = `<h3 class="font-headline-md text-primary text-[14px] mb-1 border-b border-outline-variant/30 pb-1">${dia}</h3>`;
                html += `<div class="flex flex-col gap-1">`;

                tiposComida.forEach(tipo => {
                    const slotId = `${dia}_${tipo}`;
                    const plato = weekData[slotId];

                    html += `<div class="flex items-center justify-between py-1">`;
                    if (plato) {
                        html += `
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-semibold text-on-surface-variant uppercase w-[75px] shrink-0">${tipo}</span>
                                <span class="font-body-md text-on-surface font-medium leading-tight">${plato.nombre}</span>
                            </div>
                            <button onclick="removePlato('${weekId}', '${slotId}')" class="text-error active:scale-90 transition-transform p-1 hover:bg-error/10 rounded-full shrink-0">
                                <span class="material-symbols-outlined" data-icon="delete">delete</span>
                            </button>
                        `;
                    } else {
                        html += `
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-semibold text-on-surface-variant uppercase w-[75px] shrink-0">${tipo}</span>
                            </div>
                            <button onclick="handleSelectPlato('${weekId}', '${slotId}')" class="text-primary-container font-label-md text-[11px] bg-primary/5 hover:bg-primary/10 px-2 py-1 rounded-lg active:scale-95 transition-all flex items-center gap-1 shrink-0">
                                <span class="material-symbols-outlined text-[16px]">add</span> SELECCIONAR
                            </button>
                        `;
                    }
                    html += `</div>`;
                });

                html += `</div>`;
                diaCard.innerHTML = html;
                container.appendChild(diaCard);
            });
        }

        document.getElementById('prevWeekBtn').addEventListener('click', () => {
            weekOffset--;
            localStorage.setItem('semanaVisualizada', getWeekInfo(weekOffset).weekId);
            renderWeek();
        });

        document.getElementById('nextWeekBtn').addEventListener('click', () => {
            weekOffset++;
            localStorage.setItem('semanaVisualizada', getWeekInfo(weekOffset).weekId);
            renderWeek();
        });

        async function shareMenuWhatsApp() {
            const { weekId } = getWeekInfo(weekOffset);
            
            const { data, error } = await supabase
                .from('menu')
                .select('*')
                .eq('week_id', weekId);
                
            let weekData = {};
            if (data && !error) {
                data.forEach(row => {
                    weekData[row.slot_id] = { nombre: row.plato_nombre };
                });
            }
            
            const weekNumberStr = weekId.split('_')[1];
            let mensaje = `📅 *MENÚ SEMANAL (Semana ${weekNumberStr})*\n\n`;
            
            let hasDishes = false;

            const labelMap = {
                'COMIDA 1º': '1º',
                'COMIDA 2º': '2º',
                'CENA': 'Cena'
            };

            dias.forEach(dia => {
                let dayMeals = [];
                tiposComida.forEach(tipo => {
                    const slotId = `${dia}_${tipo}`;
                    const plato = weekData[slotId];
                    if (plato && plato.nombre) {
                        const label = labelMap[tipo] || tipo;
                        dayMeals.push(`   ${label}: ${plato.nombre}`);
                    }
                });
                
                if (dayMeals.length > 0) {
                    mensaje += `*${dia.toUpperCase()}:*\n${dayMeals.join('\n')}\n`;
                    hasDishes = true;
                }
            });

            if (!hasDishes) {
                alert('No hay platos seleccionados en esta semana para compartir.');
                return;
            }

            const url = `https://wa.me/?text=${encodeURIComponent(mensaje.trim())}`;
            window.open(url, '_blank');
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            const savedWeekId = localStorage.getItem('semanaVisualizada');
            if (savedWeekId) {
                for (let i = -104; i <= 104; i++) {
                    if (getWeekInfo(i).weekId === savedWeekId) {
                        weekOffset = i;
                        break;
                    }
                }
            }
            renderWeek();

            // Realtime Sync
            if (typeof supabase !== 'undefined') {
                supabase
                    .channel('public:menu')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'menu' }, payload => {
                        renderWeek();
                    })
                    .subscribe();
            }
        });

    </script>
</body>
