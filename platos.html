<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        body {

        .plato-grid {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
        }
    </style>

          theme: {

                      "on-primary-fixed": "#351000",
                      "secondary-fixed-dim": "#fabd00",
                      "primary-fixed-dim": "#ffb694",
                      "surface-container-high": "#e9e8e5",
                      "on-surface": "#1a1c1a",
                      "secondary": "#785900",
                      "on-secondary": "#ffffff",
                      "surface-variant": "#e3e2e0",
                      "secondary-fixed": "#ffdf9e",
                      "on-tertiary-container": "#083323",
                      "on-primary-container": "#511c00",
                      "background": "#faf9f6",
                      "on-secondary-container": "#6c5000",
                      "tertiary-fixed": "#c1ecd4",
                      "error": "#ba1a1a",

                      "on-tertiary-fixed": "#002114",
                      "on-primary-fixed-variant": "#7b2f00",
                      "on-error": "#ffffff",
                      "surface-tint": "#a14000",
                      "on-primary": "#ffffff",
                      "on-error-container": "#93000a",
                      "surface-container": "#efeeeb",
                      "surface-container-low": "#f4f3f1",
                      "error-container": "#ffdad6",
                      "surface-dim": "#dbdad7",
                      "on-secondary-fixed-variant": "#5b4300",
                      "surface": "#faf9f6",
                      "primary-container": "#f26b1d",
                      "secondary-container": "#fdc003",
                      "on-tertiary-fixed-variant": "#274e3d",
                      "inverse-surface": "#2f312f",
                      "tertiary": "#3f6653",
                      "outline-variant": "#e0c0b2",
                      "primary-fixed": "#ffdbcc",
                      "on-secondary-fixed": "#261a00",
                      "surface-container-lowest": "#ffffff",
                      "on-surface-variant": "#594237",
                      "on-background": "#1a1c1a",
                      "outline": "#8c7166",
                      "inverse-on-surface": "#f2f1ee",
                      "inverse-primary": "#ffb694",
                      "surface-container-highest": "#e3e2e0",
                      "on-tertiary": "#ffffff",
                      "surface-bright": "#faf9f6"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"

              "spacing": {
                      "md": "16px",
                      "margin-desktop": "64px",
                      "sm": "8px",
                      "margin-mobile": "20px",
                      "xl": "40px",
                      "unit": "4px",
                      "xs": "4px",
                      "gutter": "16px",
                      "lg": "24px"
              },
              "fontFamily": {
                      "body-md": ["Be Vietnam Pro"],
                      "body-lg": ["Be Vietnam Pro"],
                      "headline-lg": ["Plus Jakarta Sans"],
                      "headline-md": ["Plus Jakarta Sans"],
                      "label-md": ["Be Vietnam Pro"],
                      "display-xl": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "body-md": ["14px", {"lineHeight": "22px", "fontWeight": "400"}],
                      "body-lg": ["16px", {"lineHeight": "26px", "fontWeight": "400"}],
                      "headline-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "headline-md": ["22px", {"lineHeight": "30px", "fontWeight": "700"}],
                      "label-md": ["12px", {"lineHeight": "18px", "fontWeight": "600"}],
                      "display-xl": ["46px", {"lineHeight": "54px", "letterSpacing": "-0.02em", "fontWeight": "800"}]
              }
            },
          },
        }
    </script>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen pb-32">
    <!-- TopAppBar -->
    <header class="bg-white/90 dark:bg-gray-950/90 backdrop-blur-md docked full-width top-0 z-50 border-b border-orange-100/50 dark:border-gray-800 shadow-[0_4px_20px_-4px_rgba(242,107,29,0.05)] flex items-center justify-between px-6 py-4 w-full sticky">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='index.html'" class="active:scale-95 transition-transform duration-200 ease-out text-orange-600 dark:text-orange-400">
                <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
            </button>
            <h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-orange-600 dark:text-orange-400">Mis Platos</h1>
        </div>
        <div class="h-10 w-10 rounded-full overflow-hidden border-2 border-primary-container active:scale-95 transition-transform duration-200 ease-out">
            <img alt="Usuario" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBaPBYv0WQ-z_JYvPEMuieGwZT26ZVMvOIaQMtwGNz1f7Chn18328KYWrjEGeKXTINzNZqGnX0vGhJm_fjNjlFUtgRWU8mzVuJnDh4ysBOQPav3B_zRAKVM02AMvxXIFD7HmB47h8O8s04JMQB4Wi_txVhoycAiDuyzfMsyF3_qdvC4YG8oneo4Psowsbtol6uR8qnYx39UiEOOOatpHHOHnW3kfBI7_qiT8MJHr4052jjmRwBUnaa92RvF4PZQjxNH0Eqo4uBm6zWY"/>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="px-margin-mobile pt-lg max-w-md mx-auto">
        <div class="flex flex-col gap-sm mb-lg">
            <h2 class="font-headline-lg text-primary text-headline-lg">Seleccionar Platos</h2>
        </div>
        
        <div id="catalogContainer" class="flex flex-col gap-lg">
            <!-- Categorías renderizadas dinámicamente -->
        </div>
    </main>

    <!-- Floating Action Button -->
    <button onclick="openModal()" class="fixed bottom-24 right-6 w-14 h-14 bg-primary-container text-on-primary-container rounded-full shadow-lg flex items-center justify-center active:scale-90 transition-all duration-300 z-40">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0, 'wght' 600, 'GRAD' 0, 'opsz' 48;">add</span>
    </button>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-white/95 dark:bg-gray-950/95 backdrop-blur-lg rounded-t-[32px] border-t border-orange-50 dark:border-gray-800 shadow-[0_-10px_40px_-15px_rgba(242,107,29,0.08)]">
        <a href="index.html" class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-orange-300 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Menú</span>
        </a>
        <a href="platos.html" class="flex flex-col items-center justify-center text-orange-600 dark:text-orange-400 bg-orange-50/50 dark:bg-orange-950/20 rounded-2xl px-4 py-1 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="restaurant" style="font-variation-settings: 'FILL' 1;">restaurant</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Platos</span>
        </a>
        <a href="Almacen.html" class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-orange-300 transition-colors active:scale-90 duration-300">
            <span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Almacén</span>
        </a>
    </nav>

    <!-- Modal Nuevo Plato -->
    <div id="addModal" class="hidden fixed inset-0 z-[100] bg-black/50 backdrop-blur-sm flex items-center justify-center px-4 transition-opacity">
        <div class="bg-surface rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col">
            <div class="px-6 py-4 border-b border-outline-variant/30 flex justify-between items-center">
                <h3 class="font-headline-md text-primary text-lg">Nuevo Plato</h3>
                <button onclick="closeModal()" class="text-on-surface-variant hover:text-error transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-6 flex flex-col gap-4">
                <label class="flex flex-col gap-1">
                    <span class="font-label-md text-sm text-on-surface-variant">Nombre del plato</span>
                    <input type="text" id="platoNombre" class="rounded-lg border-outline-variant border bg-surface-container-lowest p-2 focus:ring-primary focus:border-primary transition-all text-on-surface" placeholder="Ej: Pollo al horno">
                </label>
                <label class="flex flex-col gap-1">
                    <span class="font-label-md text-sm text-on-surface-variant">Categoría</span>
                    <select id="platoCat" class="rounded-lg border-outline-variant border bg-surface-container-lowest p-2 focus:ring-primary focus:border-primary transition-all text-on-surface">
                        <option value="Carnes">Carnes</option>
                        <option value="Pescados">Pescados</option>
                        <option value="Legumbres">Legumbres</option>
                        <option value="Pastas">Pastas</option>
                        <option value="Ensaladas">Ensaladas</option>
                        <option value="Otros">Otros</option>
                    </select>
                </label>
                <label class="flex flex-col gap-1">
                    <span class="font-label-md text-sm text-on-surface-variant">Calorías (kCal)</span>
                    <input type="number" id="platoKcal" class="rounded-lg border-outline-variant border bg-surface-container-lowest p-2 focus:ring-primary focus:border-primary transition-all text-on-surface" placeholder="Ej: 350">
                </label>
            </div>
            <div class="px-6 py-4 bg-surface-container-low flex justify-end gap-3">
                <button onclick="closeModal()" class="px-4 py-2 text-on-surface-variant font-label-md hover:bg-surface-variant rounded-lg transition-colors">Cancelar</button>
                <button onclick="saveNewPlato()" class="px-4 py-2 bg-primary text-on-primary font-label-md rounded-lg shadow hover:bg-primary-container transition-colors active:scale-95">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const defaultCatalogo = {
            "Carnes": [
                { id: "c1", nombre: "Solomillo a la brasa", kCal: 450 },
                { id: "c2", nombre: "Pollo al horno con hierbas", kCal: 320 }
            ],
            "Pescados": [
                { id: "p1", nombre: "Salmón al vapor con eneldo", kCal: 380 },
                { id: "p2", nombre: "Merluza a la plancha", kCal: 210 }
            ],
            "Legumbres": [
                { id: "l1", nombre: "Lentejas estofadas", kCal: 350 },
                { id: "l2", nombre: "Garbanzos con espinacas", kCal: 310 }
            ],
            "Pastas": [
                { id: "pa1", nombre: "Espaguetis con tomate", kCal: 400 },
                { id: "pa2", nombre: "Macarrones gratinados", kCal: 520 }
            ],
            "Ensaladas": [
                { id: "e1", nombre: "Ensalada César", kCal: 280 },
                { id: "e2", nombre: "Ensalada mixta fresca", kCal: 120 }
            ],
            "Otros": [
                { id: "o1", nombre: "Tortilla de patatas", kCal: 450 }
            ]
        };

        function getCatalogo() {
            let cat = localStorage.getItem('catalogoPlatos');
            if (!cat) {
                localStorage.setItem('catalogoPlatos', JSON.stringify(defaultCatalogo));
                return defaultCatalogo;
            }
            return JSON.parse(cat);
        }

        function saveCatalogo(data) {
            localStorage.setItem('catalogoPlatos', JSON.stringify(data));
        }

        function renderCatalogo() {
            const catalogo = getCatalogo();
            const container = document.getElementById('catalogContainer');
            container.innerHTML = '';

            for (const [categoria, platos] of Object.entries(catalogo)) {
                if (platos.length === 0) continue;

                const sec = document.createElement('section');
                sec.className = 'flex flex-col';
                
                let html = `
                    <h3 class="font-headline-md text-primary text-headline-md text-[16px] border-b border-outline-variant pb-xs mb-1">${categoria}</h3>
                    <div class="flex flex-col divide-y divide-surface-container-high">
                `;

                platos.forEach(plato => {
                    // Escape single quotes for the inline onclick handlers
                    const platoJSON = JSON.stringify(plato).replace(/'/g, "\\'");
                    html += `
                        <div class="py-1.5 plato-grid gap-1 hover:bg-surface-container-low transition-colors cursor-pointer rounded-lg px-2 -mx-2" onclick='handlePlatoClick(${platoJSON})'>
                            <span class="font-body-md text-on-surface">${plato.nombre}</span>
                            <span class="font-label-md text-secondary bg-secondary-container/20 px-2 py-0.5 rounded-full whitespace-nowrap text-[10px]">${plato.kCal} kCal</span>
                            <button onclick="deletePlato(event, '${categoria}', '${plato.id}')" class="text-error active:scale-90 transition-transform p-1 hover:bg-error/10 rounded-full">
                                <span class="material-symbols-outlined" data-icon="delete">delete</span>
                            </button>
                        </div>
                    `;
                });

                html += `</div>`;
                sec.innerHTML = html;
                container.appendChild(sec);
            }
        }

        function handlePlatoClick(plato) {
            const slotDataStr = localStorage.getItem('slotSeleccionado');
            if (slotDataStr) {
                const { weekId, slotId } = JSON.parse(slotDataStr);
                
                // Get menuSemanal
                let menu = JSON.parse(localStorage.getItem('menuSemanal')) || {};
                if (!menu[weekId]) menu[weekId] = {};
                
                // Assign dish
                menu[weekId][slotId] = {
                    nombre: plato.nombre,
                    kCal: plato.kCal
                };
                
                localStorage.setItem('menuSemanal', JSON.stringify(menu));
                localStorage.removeItem('slotSeleccionado');
                
                window.location.href = 'index.html';
            } else {
                // If not in selection mode, maybe just do nothing or show a toast
                console.log("Visualizando plato: ", plato.nombre);
            }
        }

        function deletePlato(e, categoria, id) {
            e.stopPropagation(); // Prevent triggering handlePlatoClick
            if(confirm('¿Seguro que deseas eliminar este plato del catálogo?')) {
                const catalogo = getCatalogo();
                catalogo[categoria] = catalogo[categoria].filter(p => p.id !== id);
                saveCatalogo(catalogo);
                renderCatalogo();
            }
        }

        function openModal() {
            document.getElementById('addModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('addModal').classList.add('hidden');
            // Reset fields
            document.getElementById('platoNombre').value = '';
            document.getElementById('platoCat').value = 'Carnes';
            document.getElementById('platoKcal').value = '';
        }

        function saveNewPlato() {
            const nombre = document.getElementById('platoNombre').value.trim();
            const categoria = document.getElementById('platoCat').value;
            const kCal = document.getElementById('platoKcal').value.trim();

            if (!nombre || !kCal) {
                alert('Por favor, rellena el nombre y las kilocalorías.');
                return;
            }

            const catalogo = getCatalogo();
            if (!catalogo[categoria]) catalogo[categoria] = [];
            
            catalogo[categoria].push({
                id: 'plato_' + Date.now(),
                nombre: nombre,
                kCal: parseInt(kCal, 10)
            });

            saveCatalogo(catalogo);
            closeModal();
            renderCatalogo();
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderCatalogo();
        });
    </script>
</body>
</html>
